run_name: pretrain_tiny_smoke
model_config: configs/minimind_tiny.yaml
tokenizer_path: data/tokenizer
train_data_path: data/samples/pretrain_tiny.jsonl
output_dir: checkpoints/pretrain_tiny
log_dir: logs

seed: 42
device: cpu
dtype: fp32

max_seq_len: 128
batch_size: 2
gradient_accumulation_steps: 1
max_steps: 20

learning_rate: 3.0e-4
min_learning_rate: 3.0e-5
weight_decay: 0.1
warmup_steps: 2
max_grad_norm: 1.0

log_interval: 1
save_interval: 10
sample_interval: 10
num_workers: 0
