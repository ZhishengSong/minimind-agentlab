run_name: pretrain_minimind_64m_local
model_config: configs/minimind_64m.yaml
tokenizer_path: data/minimind/tokenizer
train_data_path: data/minimind/pretrain_t2t_mini.jsonl
output_dir: checkpoints/pretrain_minimind_64m
log_dir: logs

seed: 42
device: auto
dtype: bf16

max_seq_len: 2048
batch_size: 4
gradient_accumulation_steps: 8
max_steps: 500

learning_rate: 3.0e-4
min_learning_rate: 3.0e-5
weight_decay: 0.1
warmup_steps: 50
max_grad_norm: 1.0

log_interval: 10
save_interval: 100
sample_interval: 100
num_workers: 2
